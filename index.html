<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Local Storage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 My Todo List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <div class="todo-input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input"
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </div>

        <div class="stats-section">
            <div class="stat">
                <span class="stat-label">Total:</span>
                <span class="stat-value" id="totalCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Active:</span>
                <span class="stat-value" id="activeCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Completed:</span>
                <span class="stat-value" id="completedCount">0</span>
            </div>
        </div>

        <div class="todo-list-section">
            <ul id="todoList" class="todo-list">
                <!-- Todos will be added here -->
            </ul>
            <div id="emptyState" class="empty-state">
                <p>📭 No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <div class="action-buttons">
            <button id="clearCompleted" class="clear-btn">Clear Completed</button>
            <button id="deleteAll" class="delete-all-btn">Delete All</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
